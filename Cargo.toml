[package]
name = "enterprise"
version = "0.1.0"
edition = "2021"

[lib]
name = "enterprise"
path = "src/lib.rs"

[[bin]]
name = "enterprise"
path = "src/bin/enterprise.rs"

[[bin]]
name = "vm"
path = "src/bin/vm.rs"

[features]
default = ["parquet"]
parquet = ["dep:parquet", "dep:arrow"]

[dependencies]
holon = { path = "../holon-rs", features = ["simd"] }
rusqlite = { version = "0.31", features = ["bundled"] }
clap = { version = "4", features = ["derive"] }
rayon = "1.10"
crossbeam = "0.8"
lru = "0.12"
chrono = "0.4"
parquet = { version = "53", optional = true }
arrow = { version = "53", optional = true, features = ["prettyprint"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
